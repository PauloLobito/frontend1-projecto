<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyNest - Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-wrapper register">
      <div class="auth-card">
        <div class="auth-header register-header">
          <div class="auth-logo register-logo">$</div>
          <h1>Criar conta</h1>
          <p>Comece a gerenciar suas finanças hoje</p>
        </div>

        <div id="message-container"></div>

        <form id="register-form" class="register-form">
          <div class="form-row">
            <div class="form-group register-group">
              <label class="form-label small">Nome</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" class="form-input with-icon register-input" id="firstName" placeholder="Seu nome" required>
              </div>
            </div>
            <div class="form-group register-group">
              <label class="form-label small">Sobrenome</label>
              <div class="input-wrapper">
                <input type="text" class="form-input register-input" id="lastName" placeholder="Sobrenome" required>
              </div>
            </div>
          </div>

          <div class="form-group register-group">
            <label class="form-label small">Email</label>
            <div class="input-wrapper">
              <span class="input-icon">✉</span>
              <input type="email" class="form-input with-icon register-input" id="email" placeholder="seu@email.com" required>
            </div>
          </div>

          <div class="form-group register-group">
            <label class="form-label small">Senha</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" class="form-input with-icon register-input" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
              <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                <span>👁</span>
              </button>
            </div>
            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-text" id="strengthText">Digite uma senha</span>
            </div>
          </div>

          <div class="form-group register-group">
            <label class="form-label small">Confirmar Senha</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" class="form-input with-icon register-input" id="confirmPassword" placeholder="Repita a senha" required>
              <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                <span>👁</span>
              </button>
            </div>
          </div>

          <label class="terms-checkbox">
            <input type="checkbox" id="terms" required>
            <div class="checkbox-custom"></div>
            <span>Eu concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a></span>
          </label>

          <button type="submit" class="btn-auth register-btn" id="register-btn">Criar Conta</button>
        </form>

        <div class="divider register-divider">
          <span>ou cadastre-se com</span>
        </div>

        <div class="social-login">
          <button type="button" class="btn-social">
            <span>G</span>
            <span>Google</span>
          </button>
          <button type="button" class="btn-social">
            <span></span>
            <span>Apple</span>
          </button>
        </div>

        <div class="auth-footer register-footer">
          <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
</body>
</html>
